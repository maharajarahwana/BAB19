<style>

*{

}

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;

  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:500px;
  margin:auto;
  padding:25px 20px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);

  margin-bottom:10px;
}

input{

  padding:12px;

  border-radius:6px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:15px;
  cursor:pointer;
  background:#007BFF;
  color:white;
  border:none;

.result{

}

.correct{

}

.wrong{

ol{

  overflow-y:auto;
  padding-left:30px;
  margin:0;
}

li{
  margin-bottom:8px;
  line-height:1.4;
}

{ soal: "찌다", jawaban: "mengukus" },
];

questions = questions.sort(()=>Math.random()-0.5);

let index = 0;
let score = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const answerInput = document.getElementById("answerInput");
const nextBtn = document.getElementById("nextBtn");
const card = document.querySelector(".card");

function showQuestion(){
  questionEl.textContent = questions[index].soal;
  answerInput.value="";
  answerInput.focus();
}

nextBtn.addEventListener("click",()=>{

  const userAnswer = answerInput.value.trim().toLowerCase();

  userAnswers[index] = userAnswer;

  if(userAnswer === questions[index].jawaban){
    score++;
  }

  index++;

  if(index < questions.length){
    showQuestion();
  }else{
    showResult();
  }

});

function showResult(){

  let answerList="";

  questions.forEach((q,i)=>{

    if(userAnswers[i] === q.jawaban){
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span></li>`;
    }else{
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span><br>
      Jawaban kamu: <span class="wrong">${userAnswers[i] || "(kosong)"}</span></li>`;
    }

  });

  card.innerHTML = `
  <hr>
  <p>Kunci Jawaban:</p>
  <ol>${answerList}</ol>
  `;

}

showQuestion();

</script>
